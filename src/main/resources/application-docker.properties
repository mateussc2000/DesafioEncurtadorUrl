spring.application.name=SuperApp

# H2 Database Configuration para Docker
spring.datasource.url=jdbc:h2:file:/app/data/shortenerdb;MODE=MySQL;AUTO_SERVER=true;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false

# JPA Open in View (desabilitar para evitar warnings)
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.encurtador_url.SuperApp=DEBUG

# Application Configuration - sobrescrito pela variavel de ambiente APP_BASE_URL
app.shortener.base-url=${APP_BASE_URL:http://localhost:8080}

