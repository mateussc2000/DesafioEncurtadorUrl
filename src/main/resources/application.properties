spring.application.name=SuperApp

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/shortenerdb;MODE=MySQL;AUTO_SERVER=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JPA Open in View (desabilitar para evitar warnings)
spring.jpa.open-in-view=false

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false

# Docker Compose Configuration (desabilitado para controle manual)
spring.docker.compose.enabled=false

# Application Configuration
app.shortener.base-url=http://localhost:8080

# API Key Authentication
app.api-key=minha-chave-secreta-123

